<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Studio J Monitor</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Pretendard', sans-serif; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; }
        .section { background: #1e293b; padding: 25px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .status-on { color: #10b981; font-weight: bold; }
        .status-off { color: #ef4444; font-weight: bold; }
        .time { font-size: 3.5rem; font-weight: 800; color: #38bdf8; margin: 10px 0; }
        button { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .btn-sleep { background: #334155; color: white; }
        .btn-shutdown { background: #7f1d1d; color: white; }
        canvas { margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="section">
            <h2 id="pwr-status">연결 확인 중...</h2>
        </div>

        <div class="section">
            <p style="opacity: 0.7; margin: 0;">오늘 사용 시간</p>
            <div id="usage-time" class="time">00:00:00</div>
        </div>

        <div class="section">
            <button class="btn-sleep" onclick="sendCmd('sleep')">🌙 절전 모드 실행</button>
            <button class="btn-shutdown" onclick="sendCmd('shutdown')">🛑 전원 끄기</button>
        </div>

        <div class="section">
            <h3 style="margin-top: 0;">📊 주간 사용량 통계</h3>
            <canvas id="weeklyChart"></canvas>
        </div>
    </div>

    <script>
        // 파이어베이스 설정 (DB 주소 끝에 / 빼기)
        const firebaseConfig = { databaseURL: "https://studio-j-monitor-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 차트 초기화
        const ctx = document.getElementById('weeklyChart').getContext('2d');
        const weeklyChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['월', '화', '수', '목', '금', '토', '일'],
                datasets: [{ label: '사용 시간(분)', data: [0, 0, 0, 0, 0, 0, 0], backgroundColor: '#38bdf8', borderRadius: 5 }]
            },
            options: { scales: { y: { beginAtZero: true, grid: { color: '#334155' } } } }
        });

        // 데이터 수신 (경로 수정: usage/pc_status)
        db.ref('usage/pc_status').on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            // 시간 업데이트
            document.getElementById('usage-time').innerText = data.today_usage || "00:00:00";
            
            // 온라인 체크 (40초)
            const lastSeen = new Date(data.last_seen.replace(/-/g, "/")).getTime();
            const now = new Date().getTime();
            document.getElementById('pwr-status').innerHTML = (now - lastSeen < 40000) ? "상태: <span class='status-on'>ONLINE</span>" : "상태: <span class='status-off'>OFFLINE</span>";

            // 그래프 업데이트
            const dayMap = { '월':0, '화':1, '수':2, '목':3, '금':4, '토':5, '일':6 };
            const todayIdx = dayMap[data.day];
            if (todayIdx !== undefined && data.today_usage) {
                const parts = data.today_usage.split(':');
                const totalMinutes = Math.floor(parseInt(parts[0])*60 + parseInt(parts[1]));
                weeklyChart.data.datasets[0].data[todayIdx] = totalMinutes;
                weeklyChart.update();
            }
        });

        function sendCmd(type) {
            const pw = prompt("비밀번호:");
            db.ref('usage/pc_status/password').once('value', (snap) => {
                if(pw === snap.val()) {
                    db.ref('commands').set({ cmd: type, time: Date.now() });
                    alert("명령 전송!");
                } else {
                    alert("비밀번호 틀림!");
                }
            });
        }
    </script>
</body>
</html>
